<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bancomer Overview — Visit Cozumel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#22c55e;--orange:#f97316;--purple:#a855f7;--teal:#14b8a6;--yellow:#eab308;--pink:#ec4899;--red:#ef4444;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;line-height:1.5;padding:24px 20px 48px}
  .header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
  .header h1{font-size:22px;font-weight:700;letter-spacing:-0.3px}
  .header p{color:var(--muted);font-size:13px;margin-top:3px}
  .badge{background:#1d3052;border:1px solid #3b82f6;color:#93c5fd;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
  .picker button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:border-color 0.15s, background 0.15s}
  .picker button:hover{border-color:var(--accent)}
  .picker button.active{background:#1d3052;border-color:var(--accent);color:#93c5fd}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 16px;position:relative;overflow:hidden}
  .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
  .kpi.green::before{background:var(--green)}
  .kpi.orange::before{background:var(--orange)}
  .kpi.purple::before{background:var(--purple)}
  .kpi.teal::before{background:var(--teal)}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
  .kpi-value{font-size:22px;font-weight:700}
  .kpi-sub{font-size:11px;color:var(--muted);margin-top:4px}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:18px}
  .panel h2{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text)}
  .panel-sub{font-size:11px;color:var(--muted);margin-top:-10px;margin-bottom:14px}
  .grid-2{display:grid;grid-template-columns:2fr 1fr;gap:18px}
  @media(max-width:900px){.grid-2{grid-template-columns:1fr}}
  canvas{max-height:340px}
  .loading{padding:40px;text-align:center;color:var(--muted)}
  .err{padding:20px;border:1px solid var(--red);border-radius:8px;background:rgba(239,68,68,0.08);color:#fca5a5;margin-bottom:18px}
  .footer{font-size:11px;color:var(--muted);margin-top:24px;text-align:center}
  .footer a{color:var(--accent)}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Bancomer Overview — Visit Cozumel</h1>
    <p>4 accounts · live read from Visit Cozumel Master Ledger</p>
  </div>
  <div id="data-through" class="badge">Loading…</div>
</div>

<div class="picker" id="picker"></div>
<div id="content"><div class="loading">Fetching ledger…</div></div>

<div class="footer">
  Source: <a href="https://docs.google.com/spreadsheets/d/1_8WIHZiIYymbvne3gG5vdRNkvF0496kWy0T-n4O7Zfc/edit" target="_blank">Visit Cozumel Master Ledger</a>.
  Drop a new statement in the Bancomer Inbox folder on Desktop, run the extractor, refresh this page.
</div>

<script>
const SHEET_ID = '1_8WIHZiIYymbvne3gG5vdRNkvF0496kWy0T-n4O7Zfc';
const TAB = '_Transactions';
const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(TAB)}`;

const ACCOUNTS = [
  { id: 'ALL_MXN', label: 'All MXN', currency: 'MXN', filter: r => ['Bancomer_C1_MXN','Bancomer_C2_MXN','Bancomer_C3_MXN'].includes(r.account_id) },
  { id: 'Bancomer_C1_MXN', label: 'Cuenta 1 (MXN)', currency: 'MXN' },
  { id: 'Bancomer_C2_MXN', label: 'Cuenta 2 (MXN)', currency: 'MXN' },
  { id: 'Bancomer_C3_MXN', label: 'Cuenta 3 (MXN)', currency: 'MXN' },
  { id: 'Bancomer_C4_USD', label: 'Cuenta USD', currency: 'USD' },
];
const REVENUE_CATS = new Set(['cruise_excursion','vacation_rental','tierra_maya_store','transport_upsell','private_charter','real_estate_rental']);
const CAT_COLORS = {
  cruise_excursion: '#22c55e',
  vacation_rental: '#a855f7',
  tierra_maya_store: '#eab308',
  transport_upsell: '#14b8a6',
  private_charter: '#ec4899',
  inter_account: '#8b949e',
  fx_conversion: '#6b7280',
  loan_proceeds: '#f97316',
  unclassified: '#475569',
};
const ACCOUNT_COLORS = {
  Bancomer_C1_MXN: '#22c55e',
  Bancomer_C2_MXN: '#a855f7',
  Bancomer_C3_MXN: '#14b8a6',
  Bancomer_C4_USD: '#f97316',
};
const fmt = (n, cur) => (cur === 'USD' ? '$' : 'MX$') + Math.round(n).toLocaleString('en-US');

let allRows = [];
let charts = [];

async function loadSheet() {
  const r = await fetch(GVIZ_URL);
  const text = await r.text();
  const json = JSON.parse(text.match(/setResponse\((.*)\)/s)[1]);
  const cols = json.table.cols.map(c => (c.label || c.id || '').toLowerCase());
  return json.table.rows.map(row => {
    const o = {};
    row.c.forEach((cell, i) => {
      let v = cell ? cell.v : null;
      if (v && typeof v === 'string' && v.startsWith('Date(')) {
        const m = v.match(/Date\((\d+),(\d+),(\d+)/);
        if (m) v = `${m[1]}-${String(+m[2]+1).padStart(2,'0')}-${m[3].padStart(2,'0')}`;
      }
      o[cols[i]] = v;
    });
    return o;
  });
}

const ymKey = d => d ? String(d).slice(0,7) : null;

function buildPicker(activeId) {
  const p = document.getElementById('picker');
  p.innerHTML = '';
  ACCOUNTS.forEach(a => {
    const b = document.createElement('button');
    b.textContent = a.label;
    if (a.id === activeId) b.classList.add('active');
    b.onclick = () => render(a.id);
    p.appendChild(b);
  });
}

function destroyCharts() {
  charts.forEach(c => c.destroy());
  charts = [];
}

function render(activeId = 'ALL_MXN') {
  const acct = ACCOUNTS.find(a => a.id === activeId);
  const cur = acct.currency;
  const filter = acct.filter || (r => r.account_id === acct.id);
  const rows = allRows.filter(filter);

  if (!rows.length) {
    document.getElementById('content').innerHTML =
      '<div class="err">No rows for ' + acct.label + ' yet.</div>';
    buildPicker(activeId);
    return;
  }

  const deposits = rows.filter(r => r.direction === 'DEPOSIT');
  const withdrawals = rows.filter(r => r.direction === 'WITHDRAWAL');
  const income = deposits.filter(r => REVENUE_CATS.has(r.category_id));

  const months = new Set(rows.map(r => ymKey(r.date)).filter(Boolean));
  const sorted = [...months].sort();
  const lastMonth = sorted[sorted.length - 1];
  const today = new Date();
  const thisYear = String(today.getFullYear());

  document.getElementById('data-through').textContent =
    `Data through ${lastMonth} · ${rows.length.toLocaleString()} txns`;

  const sumIncome = ms => income.filter(r => ms.includes(ymKey(r.date))).reduce((s,r) => s + (+r.amount||0), 0);
  const sumWithdrawals = ms => withdrawals.filter(r => ms.includes(ymKey(r.date))).reduce((s,r) => s + (+r.amount||0), 0);
  const sumAllDeposits = ms => deposits.filter(r => ms.includes(ymKey(r.date))).reduce((s,r) => s + (+r.amount||0), 0);
  const ytdMonths = sorted.filter(m => m.startsWith(thisYear));

  const incomeAllTime = sumIncome(sorted);
  const inflowsAllTime = sumAllDeposits(sorted);
  const outflowsAllTime = sumWithdrawals(sorted);

  const kpiHTML = `
    <div class="kpi-grid">
      <div class="kpi green">
        <div class="kpi-label">Income — Last Complete Month</div>
        <div class="kpi-value">${fmt(sumIncome([lastMonth]), cur)}</div>
        <div class="kpi-sub">${lastMonth}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Income — YTD ${thisYear}</div>
        <div class="kpi-value">${fmt(sumIncome(ytdMonths), cur)}</div>
        <div class="kpi-sub">Jan 1 → today</div>
      </div>
      <div class="kpi orange">
        <div class="kpi-label">All-time Income</div>
        <div class="kpi-value">${fmt(incomeAllTime, cur)}</div>
        <div class="kpi-sub">${income.length.toLocaleString()} revenue txns · ${sorted.length} months</div>
      </div>
      <div class="kpi purple">
        <div class="kpi-label">Avg Monthly Income</div>
        <div class="kpi-value">${fmt(incomeAllTime / sorted.length, cur)}</div>
        <div class="kpi-sub">All months tracked</div>
      </div>
      <div class="kpi teal">
        <div class="kpi-label">All Inflows (incl. transfers, FX, loans)</div>
        <div class="kpi-value">${fmt(inflowsAllTime, cur)}</div>
        <div class="kpi-sub">Bank's "abonos" total</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">All Outflows</div>
        <div class="kpi-value">${fmt(outflowsAllTime, cur)}</div>
        <div class="kpi-sub">Bank's "cargos" total</div>
      </div>
    </div>
  `;

  destroyCharts();
  document.getElementById('content').innerHTML = kpiHTML + `
    <div class="grid-2">
      <div class="panel">
        <h2>Monthly Income${activeId === 'ALL_MXN' ? ' — Stacked by Account' : ' — Stacked by Category'}</h2>
        <p class="panel-sub">DEPOSIT rows tagged as revenue. Inter-account / FX / loan inflows excluded.</p>
        <canvas id="monthly"></canvas>
      </div>
      <div class="panel">
        <h2>Income Mix — All-time</h2>
        <p class="panel-sub">Revenue by source category.</p>
        <canvas id="donut"></canvas>
      </div>
    </div>
    <div class="panel">
      <h2>All Deposits — Income vs Other (transfers / FX / loan / unclassified)</h2>
      <p class="panel-sub">Bank's "abonos" total reconciled. Non-revenue inflows separated out.</p>
      <canvas id="all-deposits"></canvas>
    </div>
  `;

  // Monthly chart — by account when ALL_MXN, by category otherwise
  let monthlyDatasets;
  if (activeId === 'ALL_MXN') {
    const accts = ['Bancomer_C1_MXN','Bancomer_C2_MXN','Bancomer_C3_MXN'];
    monthlyDatasets = accts.map(aid => ({
      label: aid.replace('Bancomer_','').replace('_MXN',''),
      backgroundColor: ACCOUNT_COLORS[aid],
      data: sorted.map(ym => income.filter(r => ymKey(r.date) === ym && r.account_id === aid).reduce((s,r) => s + (+r.amount||0), 0)),
    }));
  } else {
    const cats = [...new Set(income.map(r => r.category_id))].sort();
    monthlyDatasets = cats.map(cat => ({
      label: cat,
      backgroundColor: CAT_COLORS[cat] || '#58a6ff',
      data: sorted.map(ym => income.filter(r => ymKey(r.date) === ym && r.category_id === cat).reduce((s,r) => s + (+r.amount||0), 0)),
    }));
  }

  charts.push(new Chart(document.getElementById('monthly'), {
    type: 'bar',
    data: { labels: sorted, datasets: monthlyDatasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { x: { stacked: true, grid:{color:'#30363d'}, ticks:{color:'#8b949e'} }, y: { stacked: true, grid:{color:'#30363d'}, ticks:{color:'#8b949e', callback:v=>fmt(v, cur)} } },
      plugins: { legend: { labels: { color: '#e6edf3' } }, tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmt(ctx.parsed.y, cur)}` } } },
    },
  }));

  // Donut by category
  const cats2 = [...new Set(income.map(r => r.category_id))].sort();
  const donutData = cats2.map(cat => income.filter(r => r.category_id === cat).reduce((s,r) => s + (+r.amount||0), 0));
  charts.push(new Chart(document.getElementById('donut'), {
    type: 'doughnut',
    data: { labels: cats2, datasets: [{ data: donutData, backgroundColor: cats2.map(c => CAT_COLORS[c] || '#58a6ff'), borderColor: '#161b22', borderWidth: 2 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { color: '#e6edf3' } }, tooltip: { callbacks: { label: ctx => `${ctx.label}: ${fmt(ctx.parsed, cur)}` } } },
    },
  }));

  // All deposits — income vs other
  const incomeByMonth = sorted.map(ym => income.filter(r => ymKey(r.date) === ym).reduce((s,r) => s + (+r.amount||0), 0));
  const otherDepByMonth = sorted.map(ym => deposits.filter(r => ymKey(r.date) === ym && !REVENUE_CATS.has(r.category_id)).reduce((s,r) => s + (+r.amount||0), 0));
  charts.push(new Chart(document.getElementById('all-deposits'), {
    type: 'bar',
    data: {
      labels: sorted,
      datasets: [
        { label: 'Income (revenue)', backgroundColor: '#22c55e', data: incomeByMonth },
        { label: 'Other inflows (transfer / FX / loan / unclassified)', backgroundColor: '#8b949e', data: otherDepByMonth },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { x: { stacked: true, grid:{color:'#30363d'}, ticks:{color:'#8b949e'} }, y: { stacked: true, grid:{color:'#30363d'}, ticks:{color:'#8b949e', callback:v=>fmt(v, cur)} } },
      plugins: { legend: { labels: { color: '#e6edf3' } }, tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmt(ctx.parsed.y, cur)}` } } },
    },
  }));

  buildPicker(activeId);
}

(async () => {
  try {
    allRows = await loadSheet();
    render('ALL_MXN');
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="err"><b>Failed to load Sheet:</b> ${e.message}</div>`;
    console.error(e);
  }
})();
</script>

</body>
</html>
