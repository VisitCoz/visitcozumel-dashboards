<style>
:root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e4e4e7;--dim:#9ca3af;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#a855f7;--cyan:#06b6d4;--font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;--mono:'JetBrains Mono','SF Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:24px;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:700;letter-spacing:-.5px}
.header .sub{color:var(--dim);font-size:13px;margin-top:4px}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{background:var(--surface);border:1px solid var(--border);padding:6px 14px;border-radius:8px;font-size:12px;color:var(--dim)}
.badge.live{border-color:var(--green);color:var(--green)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.kpi .label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi .value{font-size:26px;font-weight:700;font-family:var(--mono);letter-spacing:-1px}
.kpi .sub{font-size:11px;color:var(--dim);margin-top:4px}
.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.blue{color:var(--accent)}.purple{color:var(--purple)}.cyan{color:var(--cyan)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.panel h3{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px}
.panel canvas{max-height:270px}
.full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
th.r,td.r{text-align:right}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px}
tr:hover{background:rgba(59,130,246,.05)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.status-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.status-pill.succeeded{background:rgba(34,197,94,.15);color:var(--green)}
.status-pill.pending{background:rgba(245,158,11,.15);color:var(--amber)}
.status-pill.canceled{background:rgba(239,68,68,.15);color:var(--red)}
.footer{margin-top:24px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);display:flex;justify-content:space-between}
</style>
</head>

const fmt = n => '$' + Math.round(n).toLocaleString('en-US');
const fmtK = n => n >= 1000000 ? '$' + (n/1000000).toFixed(2) + 'M' : '$' + Math.round(n/1000).toLocaleString('en-US') + 'K';
const centsToPesos = c => c / 100;

function extractUnit(cust) {
  const m = cust.match(/#(\d+\w?)/);
  return m ? '#' + m[1] : 'Other';
}

const pending = payments.filter(p => p.s === 'pending');
const canceled = payments.filter(p => p.s === 'canceled');

const totalCanceled = canceled.reduce((a,p) => a + centsToPesos(p.amt), 0);

const largestBooking = Math.max(...succeeded.map(p => centsToPesos(p.amt)));
const conversionRate = (succeeded.length / payments.length * 100).toFixed(1);

// Revenue by unit

  const u = extractUnit(p.cust);
  unitRevenue[u] = (unitRevenue[u] || 0) + centsToPesos(p.amt);
});

// Value distribution histogram
const brackets = ['<$1K','$1-2K','$2-3K','$3-4K','$4-5K','$5-8K','$8K+'];
const buckets = [0,0,0,0,0,0,0];
succeeded.forEach(p => {
  const v = centsToPesos(p.amt);
  if (v < 1000) buckets[0]++;
  else if (v < 2000) buckets[1]++;
  else if (v < 3000) buckets[2]++;
  else if (v < 4000) buckets[3]++;
  else if (v < 5000) buckets[4]++;
  else if (v < 8000) buckets[5]++;
  else buckets[6]++;
});

  type: 'bar',
  data: {
    labels: brackets,
    datasets: [{
      data: buckets,
      backgroundColor: '#3b82f6',
      borderRadius: 6, borderSkipped: false
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ' ' + c.parsed.y + ' bookings' } } },
    scales: { y: { ticks: { stepSize: 1 }, grid: { color: '#1e2130' } }, x: { grid: { display: false } } }
  }
});
</script>
</body>
